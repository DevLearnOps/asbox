# Minimal docker-compose fixture for inner container testing (Story 4-2)
# Used to verify that `docker compose up` works inside the sandbox.
# Docker Compose v2 delegates to Podman via podman-docker, creating a
# Netavark bridge network with aardvark-dns for service-name resolution.
#
# Integration test (requires live container):
#   cd tests/fixtures && docker compose up -d
#   docker compose exec client wget -qO- http://web:3000
#   docker compose down
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.inner
    ports:
      - "3000:3000"

  client:
    image: docker.io/library/alpine:3.20
    command: ["sleep", "infinity"]
    depends_on:
      - web
