# Sandbox Configuration
# See: https://github.com/anthropics/sandbox for full documentation

# Agents to install in the sandbox image
# At least one agent is required
installed_agents:
  - claude
  # - gemini
  # - codex

# Default agent to launch (defaults to first in installed_agents if omitted)
# default_agent: claude

# SDK versions to install (comment out to skip)
sdks:
  nodejs: "22"
  # go: "1.26.0"
  python: "3.12"

# Additional system packages to install
packages:
  - build-essential
  - curl
  - wget
  - git
  - jq
  - yq

# Host directories to mount into the sandbox
mounts:
  - source: ".."
    target: "/workspace"

# Auto-detect package.json files in mounts and isolate node_modules via named
# volumes (prevents macOS/Linux native module clashes)
# auto_isolate_deps: true

# Secret names resolved from host environment variables at runtime
# secrets:
#   - ANTHROPIC_API_KEY

# Non-secret environment variables
# Git identity for commits inside the sandbox (avoids "Author identity unknown")
env:
  GIT_AUTHOR_NAME: "Sandbox User"
  GIT_AUTHOR_EMAIL: "sandbox@localhost"
  GIT_COMMITTER_NAME: "Sandbox User"
  GIT_COMMITTER_EMAIL: "sandbox@localhost"
#   NODE_ENV: development

# MCP servers to pre-install
# mcp:
#   - playwright

# Mount host agent config directory into sandbox for OAuth/SSO token sync
# Automatically resolves paths per agent (claude: ~/.claude, gemini: ~/.gemini, codex: ~/.codex)
# Set to false to disable
# host_agent_config: false

# BMAD multi-repo mounts for cross-repo workflows
# Each entry is a path to a local repo that will be mounted into the sandbox
# bmad_repos:
#   - ../other-repo
#   - ../shared-libs

# Optional: append project-specific instructions to the generated agent
# instruction file (CLAUDE.md / GEMINI.md / AGENTS.md). Path is resolved
# relative to this config file. Fail-closed on missing/unreadable file.
# agent_instructions: ../AGENT_INSTRUCTIONS.md
